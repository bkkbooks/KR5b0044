body:
  text: 太上洞玄靈寳天尊說養蠶營種經爾時天尊同太上老君正冠而坐說一切凡夫養蠶營種五榖此乃是衆生之命蠶子是紫微宫出十方玉女所愛養之五糓蠶子是衆生之本人間種養最爲重事老君乃白天尊曰善哉天尊切見世間凡夫之人蹔寄閻浮而生唯憑衣食以活身命營田是上上業養蠶是仙聖所教修造功德莫不由於此始聖凡體服乃以田蠶以繼身命慈孝父毋造立尊像田蠶五縠善豐若人以道長者及王侯安然四方夷狄普從正道以此經力人民歡樂風雨以時唯願五榖豐登萬民以道唯念田蠶以爲富貴天尊曰凡夫在世惡心嫉妬窺謀貧賤偷竊三寳及常住物者一日一夜萬死萬生碎身酬還仍遭横禍子孫疾病恒逢惡害鬼兵誅汝惡人千身萬身酬償不了負貸師道一針一縷償人萬兩金不足三年不還令人疾病即報陽春三月令魔王放毒殺害此人若不造功德若不布施令人貧窮子孫顦顇永不與人齊等毁道謗經說師短長及不敬父母仍生白癩之疾不可治之若年年造功德布施師道田蠶萬倍之報若偷竊人物苦苦作種纔得償人宿債若欲蠶絲五榖豐者當念誦此經獲福無量惡賊反生慈心念道憶師天尊在虚空中以智慧眼自能照見世間作惡之人天必誅之一心敬道即得田蠶立報不用功力十方天尊送與汝等善知識耳天人擁護日見貴富所求皆稱心力人鬼無侵蠶獲萬倍志念所願者鬼妖滅爽天神自然擁護汝養蠶之人稽首焼香安蠶子四方及榖田中即讀十方天神名字曰謹請東方青帝護蠶君十萬人隨心降入某宅中又請南方赤帝護蠶君十萬人隨心降入某宅中又請西方白帝護蠶君十萬人隨心降入某宅中又請北方黑帝護蠶君十萬人隨心降入某宅中又請中央黃帝護蠶君十萬人隨心降入某宅中又請五方五帝神君護蠶將士各十萬人隨心降下擁護神蠶天導曰汝等在世凡夫吾今差下五方護蠶神君拯拔苦厄衆生況汝在世少信聖教爲此貧窮困躓唱衣無衣須食無食恒常乏少若欲得蠶絲五榖倉盈匱溢者可毎年在道場前燒香作珍羞雜饌供獻神仙就三寳乞蠶請師到家百味供養轉讀此經百鬼祅邪自不入宅善神自下與汝蠶絲五榖天人送與汝家令得千千萬倍汝念道憶師之恩天尊東向勑魔祝曰告汝虚耗鬼并及魍魎神道上飛尸鬼五土三將軍汝但共怍善護保諸天人田蠶獲萬倍住宅生金銀斷絶惡口舌勝越五家隣魔兵並入土啓願即從心穀帛五方入日日見懽忻念誦護法經天爲送七珍魔邪欲來者破頭作七分天尊曰汝欲得田蠶者毎結誠心上啓天神天仙即隨心下來爲作福力不令虚功耳汝可將蠶示師師與蠶子祝願蕃息即蒙道恩但一切千魔萬魅虚耗之鬼見師入宅皆悉破散去宅千里汝從養蠶子時與作功德其蠶萬不失也可即焼香與曰方口誦此經文立獲萬倍之報汝莫輕師慢經盗師父三寳物立見卒死之報稱師名號短壽命之報食佗肉多病之報手殺生命負命之報惡口兩舌喑啞之報好打奴婢破脊驢身之報齋日惡罵顚狂之報夜偷人物獖䑕之報獨食不喚人猪狗之報手把經不潔淨身惡瘡之報蠶作禾穫不報道恩貧凍饑困之報禮拜頭不着地懸蟲之報釣魚穴口缺脣之報許師施物不送毎收空無之報負信違天白癩之報閉執不通盲目之報欺罔師恩終身負病之報許設齋不修饑凍裸露之報讀經不洗手漱口口氣常臭之報罵辱父毋地獄因縁代代子孫不孝之報天尊告曰一切凡夫皆身造罪身自受報不得寛饒今身欲得長生壽考者愼勿惡心相向令人貧窮下賤蠶作少收尋日病痛子孫不成都由罪苦今報又不善行不施不惠恒生窺圖何由長年卒夭之報天尊一日一夜在於空中以道眼照見造善造惡之人分銖不夫若善男子若善女人欲求長命田蠶遂意毎以香花供養三寳三師道主天官下來爲報汝恩請福之人消除毒害所祈所禱獲得重恩諸雜暴耗神鬼不能前進聞經歡喜自悉消散天人天神以善善報以惡惡對汝等在世欲求福者可燒名香表心陳啓請諸善神依汝所願一心奉請護蠶神王隨心降下某宅中東方無極飛天神王長生大聖皆來擁護南方無極飛天神王長生大聖皆來擁護西方無極飛天神王長生大聖皆來擁護北方無極飛天神王長生大聖皆來擁護東北方無極飛天神王長生大聖皆來擁護東南方無極飛天神王長生大聖皆來擁護西南方無極飛天神王長生大聖皆來擁護西北方無極飛天神王長生大聖皆來擁護上方無極飛天神王長生大聖皆來擁護下方無極飛天神王長生大聖皆來擁護十方天王皆乘飛雲丹霄緑與瓊輪下降爲汝造善之家日日送福以報汝修福即令獲重報但造功立德終無浪失天尊告曰第一念道第二念經第三念師毎時啓道祈恩福從天來令汝善信之家無病無難無災無苦所求之願皆得遂心求男女得男女之報求官位得官位之報求金銀得金銀之報求田蠶得田蠶之報求安穩得安穏之報求延命得延命之報求衣食得衣食之報求長生得長生之報若欲遠行四道開通念誦是經即獲聖慈百餘旬内無諸枉横皆得福祐若所求不果即讀善住東來神西來神南來神北來神中來神爲汝除去惡害天行毒氣立自消滅官横不生千殃即斷天下地上諸雜百鬼悉馳他方𡜍鬼妬神咸各䑕蟄大力神王降下擁護讀誦之人福報即果厄難不加今汝坐卧安吉無諸横難天尊所說言無不善也天尊告曰汝等天人此經勝妙神通無量若家中供養延壽延筭所求稱心邪魔自滅不敢害人若遭重疾天童天女自來救治令疾瘥愈無諸損傷諸惡不害十方天尊常來護汝誦讀之人家安户吉命長壽永無有惡害行來出入諸善神王𢘆隨汝後令𨚫千災萬惡不干習誦之者福報如山聽受之人萬世康强手持此經百魔畏敬如法𢘆持心願必從天尊曰汝等凡夫不論貴賤悉皆禮敬念誦此經自然安樂八部天魔聞經滅跡善神守護門神戸尉辟斷千殃所養神蠶蕃息溢宅金銀錢財五榖豐盈男女成行傔僕異形趫勇孳息百鬼奔走天人保護蠶絲長益惡害不生願願從心聖功神力難可測量天尊告曰汝等世間無藉之鬼不忌大道明威之制變形易像或作妖怪或作家親杜竃或作形像或作百鳥聲或作夜夢或爲凡人妄求血食耗亂田蠶令不長息毎年爲害如不去者即請消害破鬼君九千萬人縛鬼君九千萬人食鬼君九千萬人斬鬼君九千萬人髙麾鐡面兵士七千萬人手持殺鬼之具兵刃外向食鬼窮騎吞鬼君九十萬人捉鬼君殺鬼君各四十萬人收𦍙君破𦍙君各十二萬人攝除宅中故氣宿骨君三十八萬人斷鬼君九十萬人一合降下主爲某家消除此土之鬼立令散滅如有一鬼留停不以理去者即請十方護蠶君百千萬人依方來下斬殺及妄前之鬼五土之精如有木精欲來金神斬之火精欲來水神滅之金精欲來火神消之水精欲來土神斷之土精欲來木神尅之此之五鬼主人某家先奉天尊旨教以令天師收攝金木水火土五神之精悉使迸散萬事吉祥虚耗之鬼百雜之魔千妖萬魅女姑土長悉令四散中鬼入土千丈萬尺保護神王衞護主人蠶作千倍岀入吉祥護宅力士消害去禍年時𧖟成歳中作熟願願從心起念福至讀誦之人延年加筭宅生黃金地踊寳藏惡害毒蠆逺祛千里天仙聖神龍衆梵衆皆來聽經十方靈童降下瞻仰護宅神王皆悉擁護此經微妙不可思議大衆聞經各各頂禮圍繞天尊稱善作禮歸命奉行太上洞玄靈寳天尊說養蠶營種經
